name: method_source_mix_tcga
method_type: source_mix
hne_norm: off
aug: heavy
class_weight: on
loss: weighted_ce
sampler: random
stage_policy: validation_multiclass_auc
til_estimator: hard_raw
hnscc_ratio: 0.75
tcga_ratio: 0.25
epochs_stage1: 30
epochs_stage2: 30
batch_size: 32
seed: 42
notes: >
  Mix stratified TCGA patches from dataset/train (pretrained source) into
  each HNSCC fold train split only. dataset/test is TCGA internal holdout;
  dataset/Testset (CPTAC_LUAD/LUSC, RUMC-BRCA) stays external and is not mixed.
