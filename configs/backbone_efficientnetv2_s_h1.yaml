experiment:
  name: backbone_efficientnetv2_s_h1

model:
  backbone: efficientnetv2_s
  pretrained: baselines/source_pretrain_efficientnetv2_s/source_pretrained_efficientnetv2_s_best.h5
  dropout: 0.2
  label_smoothing: 0.0

data:
  csv_hnscc: qupath_dataset.csv
  csv_tcga: tcga_train_dataset.csv
  fold_csv: folds_hnscc_group5.csv
  source_mix_ratio: 0.50

preprocessing:
  hne_norm: false
  augmentation: heavy

training:
  class_weight: true
  learning_rate: 0.0001
  weight_decay: 0.0001
  batch_size: 32
  epochs_stage1: 20
  epochs_stage2: 30
  stage_selection_metric: val_multiclass_auc
  seed: 42

evaluation:
  primary_metrics:
    - positive_auc
    - positive_prc
  secondary_metrics:
    - macro_ovr_auc
    - weighted_ovr_auc
    - hard_til_mae
